name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    # `next build` prerenders the `[site]` route (and reads the sitemap/health
    # route), so it needs a reachable database — without one, every prerender
    # throws ECONNREFUSED and the build fails. Spin up a throwaway Postgres and
    # apply migrations before building, mirroring how the build is verified
    # locally. The DB is empty; the placeholder `[site]` param then resolves to
    # `notFound()` (BR-4 reserves its slug) instead of a connection error.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tedxplore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # A local, unpooled Postgres — the runtime client and migrations both
      # point at the same service container in CI.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tedxplore
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/tedxplore
      # `next build` executes module scope, which validates the server env
      # (src/config/env.ts). A throwaway build-time value — the deployed output
      # reads the real secret from the runtime environment.
      BETTER_AUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm/action-setup reads it from package.json's
      # `packageManager` field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
