name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm/action-setup reads it from package.json's
      # `packageManager` field. Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # `next build` executes module scope, which validates the server env
          # (src/config/env.ts). These are throwaway build-time values — the
          # build output reads the real secrets from the runtime environment.
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime
